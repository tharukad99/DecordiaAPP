<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DECORDIA App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 5rem auto;
            text-align: center;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .auth-form input {
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
        }

        .error-message {
            color: #ff4d4d;
            margin-top: 1rem;
            display: none;
        }

        .success-message {
            color: #4CAF50;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <main class="main-content auth-container panel">
            <h1 class="brand-title" style="display: flex; align-items: center; justify-content: center;">
                DE<img src="{{ url_for('static', filename='img/logo-decodia.png') }}" alt="C"
                    style="height: 0.9em; margin: 0 0.05em; vertical-align: middle; transform: translateY(-3%);">ORDIA
            </h1>
            <!-- <h2>Register</h2> -->
            <form id="register-form" class="auth-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="submit-btn primary-btn">Register</button>
            </form>
            <div id="register-error" class="error-message"></div>
            <div id="register-success" class="success-message"></div>
            <p style="margin-top: 1.5rem;">Already have an account? <a href="/login"
                    style="color: var(--primary-color);">Login here</a></p>
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>

</html>
